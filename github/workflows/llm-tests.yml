name: LLM Performance & Quality Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Baseline Test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: k6 run --env GROQ_API_KEY=$GROQ_API_KEY tests/baseline_test.js

      - name: Run Quality Test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: k6 run --env GROQ_API_KEY=$GROQ_API_KEY tests/quality_test.js

      - name: Run Consistency Test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: k6 run --env GROQ_API_KEY=$GROQ_API_KEY tests/consistency_test.js